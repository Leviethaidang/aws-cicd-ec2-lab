<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Test CRUD project</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 24px;
            background: #f7f7f7;
            color: #222;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            background: #fff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        .user-form {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e5e7eb;
        }

        label {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-weight: 600;
            color: #374151;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 15px;
        }

        input:focus {
            border-color: #2563eb;
            outline: none;
        }

        .form-actions {
            grid-column: 1 / -1;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .secondary-btn {
            background: #6b7280;
        }

        .secondary-btn:hover {
            background: #4b5563;
        }

        .danger-btn {
            background: #dc2626;
        }

        .danger-btn:hover {
            background: #b91c1c;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 720px;
            background: #fff;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #f4f4f4;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .actions button {
            padding: 8px 10px;
            margin: 0;
        }

        .status {
            margin-top: 12px;
            color: #666;
        }

        .error {
            color: #dc2626;
        }

        .success {
            color: #15803d;
        }

        @media (max-width: 760px) {
            body {
                margin: 12px;
            }

            .container {
                padding: 16px;
            }

            .user-form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Quản lý người dùng</h1>

        <form id="user-form" class="user-form">
            <input type="hidden" id="user-id">

            <label>
                Tên
                <input id="name" name="name" type="text" required maxlength="255">
            </label>

            <label>
                Số điện thoại
                <input id="phone" name="phone" type="tel" required maxlength="50">
            </label>

            <label>
                Địa chỉ
                <input id="address" name="address" type="text" required maxlength="255">
            </label>

            <div class="form-actions">
                <button id="submit-btn" type="submit">Thêm người dùng</button>
                <button id="cancel-btn" class="secondary-btn" type="button" hidden>Hủy sửa</button>
            </div>
        </form>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Tên</th>
                        <th>Số điện thoại</th>
                        <th>Địa chỉ</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>

                <tbody id="users-body"></tbody>
            </table>
        </div>

        <p id="status" class="status"></p>
    </div>

    <script>
        const usersBody = document.getElementById('users-body');
        const statusEl = document.getElementById('status');
        const userForm = document.getElementById('user-form');
        const userIdInput = document.getElementById('user-id');
        const nameInput = document.getElementById('name');
        const phoneInput = document.getElementById('phone');
        const addressInput = document.getElementById('address');
        const submitBtn = document.getElementById('submit-btn');
        const cancelBtn = document.getElementById('cancel-btn');

        let users = [];

        function setStatus(message, type = '') {
            statusEl.textContent = message;
            statusEl.className = type ? `status ${type}` : 'status';
        }

        function getUserPayload() {
            return {
                name: nameInput.value.trim(),
                phone: phoneInput.value.trim(),
                address: addressInput.value.trim()
            };
        }

        function resetForm() {
            userForm.reset();
            userIdInput.value = '';
            submitBtn.textContent = 'Thêm người dùng';
            cancelBtn.hidden = true;
        }

        function renderUsers() {
            usersBody.innerHTML = '';

            if (!users.length) {
                usersBody.innerHTML = '<tr><td colspan="4">Không có dữ liệu.</td></tr>';
                return;
            }

            users.forEach(user => {
                const tr = document.createElement('tr');

                const tdName = document.createElement('td');
                tdName.textContent = user.name || '';

                const tdPhone = document.createElement('td');
                tdPhone.textContent = user.display_data || '';

                const tdAddress = document.createElement('td');
                tdAddress.textContent = user.display_address || '';

                const tdActions = document.createElement('td');
                tdActions.className = 'actions';

                const editBtn = document.createElement('button');
                editBtn.type = 'button';
                editBtn.className = 'secondary-btn';
                editBtn.textContent = 'Sửa';
                editBtn.addEventListener('click', () => startEdit(user));

                const deleteBtn = document.createElement('button');
                deleteBtn.type = 'button';
                deleteBtn.className = 'danger-btn';
                deleteBtn.textContent = 'Xóa';
                deleteBtn.addEventListener('click', () => deleteUser(user));

                tdActions.appendChild(editBtn);
                tdActions.appendChild(deleteBtn);

                tr.appendChild(tdName);
                tr.appendChild(tdPhone);
                tr.appendChild(tdAddress);
                tr.appendChild(tdActions);
                usersBody.appendChild(tr);
            });
        }

        async function loadUsers() {
            try {
                setStatus('Đang tải danh sách người dùng...');

                const response = await fetch('/api/users');

                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }

                const result = await response.json();
                users = result.data || [];
                renderUsers();
                setStatus('');
            } catch (error) {
                setStatus('Lỗi khi tải danh sách người dùng: ' + error.message, 'error');
            }
        }

        function startEdit(user) {
            userIdInput.value = user.id;
            nameInput.value = user.name || '';
            phoneInput.value = user.display_data || '';
            addressInput.value = user.display_address || '';
            submitBtn.textContent = 'Cập nhật người dùng';
            cancelBtn.hidden = false;
            nameInput.focus();
        }

        async function saveUser(event) {
            event.preventDefault();

            const id = userIdInput.value;
            const payload = getUserPayload();
            const url = id ? `/api/users/${id}` : '/api/users';
            const method = id ? 'PUT' : 'POST';

            try {
                submitBtn.disabled = true;
                setStatus(id ? 'Đang cập nhật người dùng...' : 'Đang thêm người dùng...');

                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'HTTP ' + response.status);
                }

                resetForm();
                await loadUsers();
                setStatus(result.message, 'success');
            } catch (error) {
                setStatus('Lỗi khi lưu người dùng: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
            }
        }

        async function deleteUser(user) {
            const confirmed = confirm(`Bạn có chắc muốn xóa người dùng "${user.name}"?`);

            if (!confirmed) {
                return;
            }

            try {
                setStatus('Đang xóa người dùng...');

                const response = await fetch(`/api/users/${user.id}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'HTTP ' + response.status);
                }

                if (userIdInput.value === String(user.id)) {
                    resetForm();
                }

                await loadUsers();
                setStatus(result.message, 'success');
            } catch (error) {
                setStatus('Lỗi khi xóa người dùng: ' + error.message, 'error');
            }
        }

        userForm.addEventListener('submit', saveUser);
        cancelBtn.addEventListener('click', resetForm);
        window.addEventListener('DOMContentLoaded', loadUsers);
    </script>
</body>
</html>
